{% extends 'base.html' %}
{% block titulo %}Registro — Trellio{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="mb-3 text-center fw-bold">🗂️ Trellio</h4>
            <h6 class="text-muted text-center mb-4">Crea tu cuenta</h6>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Registrarse</button>
            </form>
            <hr>
            <p class="text-center text-muted small">¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
