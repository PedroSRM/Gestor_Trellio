{% extends 'base.html' %}
{% block titulo %}Iniciar Sesión — Trellio{% endblock %}
{% block contenido %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h4 class="mb-3 text-center fw-bold">🗂️ Trellio</h4>
            <h6 class="text-muted text-center mb-4">Inicia sesión en tu cuenta</h6>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                {% if form.errors %}
                <div class="alert alert-danger">Usuario o contraseña incorrectos.</div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
            </form>
            <hr>
            <p class="text-center text-muted small">¿No tienes cuenta? <a href="{% url 'tableros:registro' %}">Regístrate</a></p>
        </div>
    </div>
</div>
{% endblock %}
