{% extends 'base.html' %}
{% block titulo %}Eliminar Tablero — Trellio{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h4>¿Eliminar "{{ tablero.nombre }}"?</h4>
            <p class="text-muted">Esta acción no se puede deshacer.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'tableros:detalle_tablero' tablero.id %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
